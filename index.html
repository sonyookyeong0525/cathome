<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATHOME</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <!-- 상단 띠배너 -->
  <div class="top-banner"></div>

  <!-- 헤더 -->
  <header class="header">
    <!-- 로고 -->
    <div class="header__logo"></div>
    <!-- 검색바 -->
    <div class="header__search"></div>
    <!-- 우측 아이콘 영역 (알림/장바구니/프로필) -->
    <div class="header__icons"></div>
    <!-- GNB 네비게이션 -->
    <nav class="header__gnb">
      <ul></ul>
    </nav>
  </header>

  <main>

    <!-- 히어로 슬라이더 섹션 -->
    <section class="hero">
      <!-- 슬라이드 목록 -->
      <div class="hero__slides"></div>
      <!-- 좌우 화살표 -->
      <button class="hero__arrow hero__arrow--prev"></button>
      <button class="hero__arrow hero__arrow--next"></button>
      <!-- 슬라이드 카운터 -->
      <div class="hero__counter"></div>
    </section>

    <!-- 카테고리 탭 + 아이콘 그리드 섹션 -->
    <section class="category">
      <!-- 탭 (사료/간식/용품) -->
      <div class="category__tabs"></div>
      <!-- 아이콘 카드 2행 4열 그리드 -->
      <div class="category__grid"></div>
    </section>

    <!-- 핫딜 섹션 -->
    <section class="hotdeal">
      <!-- 섹션 타이틀 + 더보기 -->
      <div class="section-header"></div>
      <!-- 상품 카드 4열 그리드 -->
      <div class="hotdeal__grid"></div>
    </section>

    <!-- 신상품 섹션 -->
    <section class="new-arrival">
      <!-- 섹션 타이틀 + 더보기 -->
      <div class="section-header"></div>
      <!-- 상품 카드 4열 그리드 -->
      <div class="new-arrival__grid"></div>
    </section>

    <!-- 나캣랭킹 섹션 -->
    <section class="ranking">
      <!-- 섹션 타이틀 -->
      <div class="section-header"></div>
      <!-- 어코디언 랭킹 목록 -->
      <ul class="ranking__list"></ul>
    </section>

    <!-- 집사 커뮤니티 섹션 -->
    <section class="community">
      <!-- 섹션 타이틀 + 더보기 -->
      <div class="section-header"></div>
      <!-- 2열 2행 카드 그리드 -->
      <div class="community__grid"></div>
    </section>

    <!-- 하단 배너 (3분할) -->
    <section class="bottom-banner">
      <div class="bottom-banner__item"></div>
      <div class="bottom-banner__item"></div>
      <div class="bottom-banner__item"></div>
    </section>

  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <!-- 로고 + SNS 아이콘 -->
    <div class="footer__top"></div>
    <!-- 회사 정보 -->
    <div class="footer__info"></div>
    <!-- 카피라이트 + 정책 링크 -->
    <div class="footer__bottom"></div>
  </footer>

  <!-- 우하단 채팅 버튼 -->
  <button class="chat-btn"></button>

  <!-- 상단으로 스크롤 버튼 -->
  <button class="scroll-top-btn"></button>

  <script src="js/index.js"></script>
</body>
</html>
