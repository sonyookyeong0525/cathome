<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — CATHOME</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- 상단 띠배너 -->
  <div class="top-banner">
    <a href="#" class="top-banner__link">이번 주 행사 이벤트 모아보기 →</a>
  </div>

  <!-- 헤더 -->
  <header class="header">
    <div class="header__inner">
      <div class="header__top">
        <a href="index.html" class="header__logo">
          <img src="img/logo_ko.png" alt="CATHOME" class="header__logo-img">
        </a>
        <div class="header__search">
          <input type="text" class="header__search-input" placeholder="검색어를 입력하세요">
          <button class="header__search-btn" aria-label="검색">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
        <div class="header__icons">
          <button class="header__icon-btn" aria-label="알림">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
          <button class="header__icon-btn" aria-label="장바구니">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
          </button>
          <button class="header__icon-btn" aria-label="프로필">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </button>
        </div>
      </div>
      <nav class="header__gnb">
        <ul class="header__gnb-list">
          <li><a href="#">카테고리</a></li>
          <li><a href="#">핫딜</a></li>
          <li><a href="#">신상품</a></li>
          <li><a href="#">랭킹</a></li>
          <li><a href="#">이벤트</a></li>
          <li><a href="#">체험단</a></li>
          <li><a href="board.html">집사커뮤니티</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- 로그인 메인 -->
  <main class="login-main">

    <div class="login-box">

      <!-- 로고 -->
      <a href="index.html" class="login-logo">
        <img src="img/logo_ko.png" alt="CATHOME">
      </a>

      <!-- 탭 -->
      <div class="login-tabs">
        <button class="login-tab login-tab--active" data-tab="login">로그인</button>
        <button class="login-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 에러 메시지 -->
      <p class="login-error"></p>

      <!-- 로그인 폼 -->
      <div class="login-panel login-panel--active" data-panel="login">
        <form id="form-login">
          <div class="login-field">
            <label for="login-email">이메일</label>
            <input type="email" id="login-email" name="email" placeholder="이메일을 입력하세요" required>
          </div>
          <div class="login-field">
            <label for="login-password">비밀번호</label>
            <input type="password" id="login-password" name="password" placeholder="비밀번호를 입력하세요" required>
          </div>
          <button type="submit" class="btn btn--primary login-submit">로그인</button>
        </form>
      </div>

      <!-- 회원가입 폼 -->
      <div class="login-panel" data-panel="signup">
        <form id="form-signup">
          <div class="login-field">
            <label for="signup-email">이메일</label>
            <input type="email" id="signup-email" name="email" placeholder="이메일을 입력하세요" required>
          </div>
          <div class="login-field">
            <label for="signup-password">비밀번호</label>
            <input type="password" id="signup-password" name="password" placeholder="비밀번호 (6자 이상)" required>
          </div>
          <div class="login-field">
            <label for="signup-confirm">비밀번호 확인</label>
            <input type="password" id="signup-confirm" name="confirm" placeholder="비밀번호를 다시 입력하세요" required>
          </div>
          <button type="submit" class="btn btn--primary login-submit">회원가입</button>
        </form>
      </div>

    </div>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="container">
      <div class="footer__top">
        <a href="index.html" class="footer__logo">
          <img src="img/logo_ko.png" alt="CATHOME" class="footer__logo-img">
        </a>
        <div class="footer__sns">
          <a href="#" class="footer__sns-btn" aria-label="인스타그램">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
            </svg>
          </a>
          <a href="#" class="footer__sns-btn" aria-label="유튜브">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
              <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
            </svg>
          </a>
          <a href="#" class="footer__sns-btn" aria-label="트위터">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4l16 16M4 20L20 4"/>
            </svg>
          </a>
        </div>
      </div>
      <div class="footer__info">
        <p>상호명: 캣홈 주식회사 &nbsp;|&nbsp; 대표자: 홍길동 &nbsp;|&nbsp; 사업자등록번호: 123-45-67890</p>
        <p>주소: 서울특별시 강남구 테헤란로 123, 캣홈빌딩 4층</p>
        <p>고객센터: 1588-0000 &nbsp;|&nbsp; 이메일: help@cathome.kr &nbsp;|&nbsp; 운영시간: 평일 09:00 ~ 18:00</p>
      </div>
      <div class="footer__bottom">
        <p class="footer__copy">&copy; 2026 CATHOME. All rights reserved.</p>
        <div class="footer__policy">
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/login.js"></script>
</body>
</html>
